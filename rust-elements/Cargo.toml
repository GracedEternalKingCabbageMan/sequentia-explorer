[package]
edition = "2018"
name = "elements"
version = "0.26.1"
authors = ["Andrew Poelstra <apoelstra@blockstream.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Library with support for de/serialization, parsing and executing on data structures and network messages related to Elements"
homepage = "https://github.com/ElementsProject/rust-elements/"
documentation = "https://docs.rs/elements/"
readme = "README.md"
license = "CC0-1.0"
repository = "https://github.com/ElementsProject/rust-elements/"

[features]
base64 = ["bitcoin/base64"]
# SEQUENTIA: (de)serialize the Bitcoin-anchor field in block headers and commit
# it in the block hash (see src/block.rs). Enable when indexing a Sequentia chain.
sequentia = []
default = ["json-contract"]
json-contract = ["serde_json"]
serde = [
    "bitcoin/serde",
    "bitcoin/serde",
    "secp256k1-zkp/serde",
    "actual-serde",
]

[lib]
name = "elements"
path = "src/lib.rs"

[[example]]
name = "pset_blind_coinjoin"
path = "examples/pset_blind_coinjoin.rs"

[[example]]
name = "raw_blind"
path = "examples/raw_blind.rs"

[[example]]
name = "tx"
path = "examples/tx.rs"

[dependencies.actual-serde]
version = "1.0.103"
features = ["derive"]
optional = true
package = "serde"

[dependencies.bech32]
version = "0.11.0"

[dependencies.bitcoin]
version = "0.32.2"

[dependencies.secp256k1-zkp]
version = "0.11.0"
features = [
    "global-context",
    "hashes",
]

[dependencies.serde_json]
version = "1.0"
optional = true

[dev-dependencies.bincode]
version = "1.3"

[dev-dependencies.rand]
version = "0.8"

[dev-dependencies.rand_chacha]
version = "0.3"

[dev-dependencies.serde_cbor]
version = "0.8"

[dev-dependencies.serde_json]
version = "1.0"

[dev-dependencies.serde_test]
version = "1.0.19"

[target.wasm32-unknown-unknown.dev-dependencies.getrandom]
version = "0.2"
features = ["js"]

